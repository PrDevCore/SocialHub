name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: social-hub/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: social-hub

      - name: Type check
        run: npx tsc --noEmit
        working-directory: social-hub

      - name: Lint
        run: npm run lint
        working-directory: social-hub

      - name: Run tests
        run: npm test
        working-directory: social-hub

      - name: Build
        run: npm run build
        working-directory: social-hub